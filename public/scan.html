<!DOCTYPE html>

<html>
<head>

<title>QR Attendance</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#eef2f7;
font-family:Segoe UI;
}

.card-ui{
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
margin-bottom:20px;
}

.scan-box{
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
text-align:center;
}

#reader{
width:320px;
margin:auto;
display:none;
}

.status-text{
font-size:20px;
font-weight:600;
}

.location-ok{
color:green;
font-weight:500;
}

.location-off{
color:red;
font-weight:500;
}

.scan-btn{
font-size:18px;
padding:12px;
}

</style>

</head>

<body>

<div class="container mt-4">

<div class="d-flex justify-content-between align-items-center mb-3">

<h3>📷 Scan Attendance</h3>

<button class="btn btn-danger" onclick="logout()">Logout</button>

</div>

<div class="card-ui">

<h5 id="empDetails"></h5>

<div id="clock" class="text-muted"></div>

<div id="locationStatus" class="mt-1"></div>

</div>

<div class="card-ui text-center">

<h6 class="text-muted">Last Scan Status</h6>

<div id="lastStatus" class="status-text">Loading...</div>

</div>

<div class="card-ui">

<h5 class="mb-3">📋 How to Scan Attendance</h5>

<ol class="mb-0">

<li>Enable <b>Location (GPS)</b></li>
<li>Click <b>Start QR Scan</b></li>
<li>Allow <b>Camera permission</b></li>
<li>Scan the <b>Office QR Code</b></li>
<li>Wait for <b>Success message</b></li>

</ol>

</div>

<div id="successBox" class="alert alert-success d-none"></div>

<div class="card-ui text-center">

<button class="btn btn-primary scan-btn" onclick="startScanner()">
▶ Start QR Scan
</button>

</div>

<div class="scan-box">

<div id="reader"></div>

</div>

<div class="card-ui">

<h5 class="mb-3">📅 Upcoming Holidays</h5>

<table class="table table-bordered">

<thead class="table-dark">

<tr>
<th>Date</th>
<th>Reason</th>
</tr>

</thead>

<tbody id="holidayTable"></tbody>

</table>

</div>

</div>

<script>

let userLat=null;
let userLng=null;
let scannerStarted=false;

const employeeId=localStorage.getItem("employee_id");
const employeeName=localStorage.getItem("employee_name");
const employeeDept=localStorage.getItem("employee_department");

/* ✅ LOCATION UPDATED */

const officeLat=11.0747337;
const officeLng=76.9580952;
const allowedRadius=200;

if(!employeeId){

alert("Login First");
window.location.href="login.html";

}

document.getElementById("empDetails").innerHTML=
"👤 "+employeeName+" | 🆔 "+employeeId+" | 🏢 "+employeeDept;

function updateClock(){

const now=new Date();

document.getElementById("clock").innerText=
"⏰ "+now.toLocaleTimeString();

}

setInterval(updateClock,1000);
updateClock();

navigator.geolocation.watchPosition(function(pos){

userLat=pos.coords.latitude;
userLng=pos.coords.longitude;

document.getElementById("locationStatus").innerHTML=
"<span class='location-ok'>📍 Location Enabled</span>";

},
function(){

document.getElementById("locationStatus").innerHTML=
"<span class='location-off'>⚠ Location OFF — Enable GPS</span>";

},{
enableHighAccuracy:true
});

function getDistance(lat1,lon1,lat2,lon2){

const R=6371e3;

const φ1=lat1*Math.PI/180;
const φ2=lat2*Math.PI/180;

const Δφ=(lat2-lat1)*Math.PI/180;
const Δλ=(lon2-lon1)*Math.PI/180;

const a=
Math.sin(Δφ/2)*Math.sin(Δφ/2)+
Math.cos(φ1)*Math.cos(φ2)*
Math.sin(Δλ/2)*Math.sin(Δλ/2);

const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;

}

function startScanner(){

if(scannerStarted) return;

document.getElementById("reader").style.display="block";

const html5QrCode=new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices=>{

let backCamera=devices.find(d=>
d.label.toLowerCase().includes("back") ||
d.label.toLowerCase().includes("rear")
);

if(!backCamera){
backCamera=devices[0];
}

html5QrCode.start(
backCamera.id,
{fps:10,qrbox:250},

(decodedText)=>{

if(!userLat || !userLng){

alert("⚠ Enable GPS first");
return;

}

let distance=getDistance(userLat,userLng,officeLat,officeLng);

if(distance>allowedRadius){

alert("❌ Outside office location");
return;

}

document.getElementById("actionPopup").style.display="flex";

}

);

});

scannerStarted=true;

}

function updateLastStatus(msg){

const status=document.getElementById("lastStatus");

if(msg.includes("IN"))
status.innerHTML="<span class='text-success'>IN TIME</span>";

else if(msg.includes("Lunch Out"))
status.innerHTML="<span class='text-warning'>LUNCH OUT</span>";

else if(msg.includes("Lunch In"))
status.innerHTML="<span class='text-primary'>LUNCH IN</span>";

else if(msg.includes("OUT"))
status.innerHTML="<span class='text-danger'>OUT TIME</span>";

}

function loadStatus(){

fetch("/employee/status?employee_id="+employeeId)
.then(res=>res.json())
.then(data=>{
document.getElementById("lastStatus").innerText=data.status;
});

}

loadStatus();

function loadHolidays(){

fetch("/admin/upcoming-holidays")
.then(res=>res.json())
.then(data=>{

const tbody=document.getElementById("holidayTable");
tbody.innerHTML="";

data.forEach(h=>{

const tr=`
<tr>
<td>${new Date(h.holiday_date).toLocaleDateString()}</td>
<td>${h.reason}</td>
</tr>
`;

tbody.insertAdjacentHTML("beforeend",tr);

});

});

}

loadHolidays();

function logout(){

localStorage.clear();
window.location.href="login.html";

}

function sendAttendance(type){

document.getElementById("actionPopup").style.display="none";

fetch("/mark-attendance",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
employee_id:employeeId,
type:type,
lat:userLat,
lng:userLng
})
})
.then(res=>res.text())
.then(msg=>{

const successBox=document.getElementById("successBox");

successBox.innerText=msg;
successBox.classList.remove("d-none");

updateLastStatus(msg);

setTimeout(()=>{
location.reload();
},3000);

});

}

</script>
<!-- ACTION POPUP -->

<div id="actionPopup" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
">

<div style="
background:white;
padding:25px;
border-radius:10px;
width:300px;
text-align:center;
">

<h5 class="mb-3">Select Attendance</h5>

<button class="btn btn-success w-100 mb-2" onclick="sendAttendance('IN')">
IN TIME
</button>

<button class="btn btn-warning w-100 mb-2" onclick="sendAttendance('LUNCH_OUT')">
Lunch Start
</button>

<button class="btn btn-info w-100 mb-2" onclick="sendAttendance('LUNCH_IN')">
Lunch End
</button>

<button class="btn btn-secondary w-100 mb-2" onclick="sendAttendance('PERMISSION')">
Afternoon Permission
</button>

<button class="btn btn-danger w-100" onclick="sendAttendance('OUT')">
OUT TIME
</button>

</div>
</div>
</body>
</html>
