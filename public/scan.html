<!DOCTYPE html>

<html>
<head>

<title>Sadhvi Attendance</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="icon" href="/favicon.ico" type="image/x-icon">

<link rel="manifest" href="/manifest.json">

<script src="https://unpkg.com/html5-qrcode"></script>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#eef2f7,#dfe9f3);
font-family: 'Segoe UI', sans-serif;
}

/* CONTAINER */
.container{
max-width:500px;
}

/* MODERN CARD */
.card-ui{
background: rgba(255,255,255,0.9);
backdrop-filter: blur(10px);
border-radius:16px;
padding:18px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
margin-bottom:18px;
border:1px solid rgba(255,255,255,0.3);
transition:0.3s;
}

.card-ui:hover{
transform: translateY(-2px);
}

/* HEADER */
.header-card{
background: linear-gradient(135deg,#0d6efd,#4dabf7);
color:white;
}

.header-card h5{
color:white;
font-weight:600;
}

/* TEXT */
.status-text{
font-size:18px;
font-weight:600;
}

.location-ok{ color:#16a34a; }
.location-off{ color:#dc2626; }

/* BUTTON */
.scan-btn{
font-size:16px;
padding:12px;
border-radius:12px;
background: linear-gradient(135deg,#0d6efd,#3b82f6);
border:none;
box-shadow:0 5px 15px rgba(13,110,253,0.3);
}

.scan-btn:hover{
transform:scale(1.02);
}

/* SMALL CARDS INSIDE */
.border{
border:none !important;
background:#f8fafc;
border-radius:10px;
}

/* TABLE */
.table th{
font-size:12px;
color:#6b7280;
}

.table td{
font-size:14px;
}

/* SCANNER */
#reader{
width:100%;
max-width:300px;
margin:auto;
display:none;
border-radius:12px;
overflow:hidden;
}

/* FLOATING BUTTON */
.floating-scan-btn{
position:fixed;
bottom:20px;
right:20px;
width:65px;
height:65px;
border-radius:50%;
background:linear-gradient(135deg,#0d6efd,#2563eb);
color:white;
border:none;
font-size:28px;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
z-index:999;
transition:0.3s;
}

.floating-scan-btn:hover{
transform:scale(1.1);
}

/* MOBILE */
@media(max-width:576px){
.card-ui{ padding:15px; }
}

/* SAFE SPACE */
body{ padding-bottom:90px; }

</style>

</head>

<body>

<div class="container mt-4">

<!-- HEADER -->
<div class="card-ui header-card d-flex justify-content-between align-items-center">

 <div class="d-flex align-items-center gap-2">
  <img src="/icon-192.png" style="height:32px;">
  <h5 class="mb-0">Sadhvi Attendance</h5>
</div>

<button class="btn btn-light btn-sm" onclick="logout()">
🔒 Logout
</button>

</div>

<!-- EMPLOYEE -->
<div class="card-ui">

<div class="d-flex justify-content-between align-items-center mb-2">

<div>
<h6 id="empDetails" class="mb-0 fw-bold"></h6>
<small class="text-muted">Employee Details</small>
</div>

<div class="text-end">
<div id="clock" class="fw-bold text-primary"></div>
<small class="text-muted">Current Time</small>
</div>

</div>

<hr>

<div class="d-flex justify-content-between align-items-center">
<div id="locationStatus"></div>

<button class="btn btn-outline-primary btn-sm" onclick="refreshLocation()">
📍 Refresh
</button>
</div>

</div>

<!-- ATTENDANCE -->
<div class="card-ui">

<h6 class="text-center text-muted mb-3">📅 Today's Attendance</h6>
<div id="todayDate" class="text-center fw-bold text-primary mb-3"></div>

<div class="row text-center g-2">

<div class="col-6">
<div class="p-2">
<small class="text-muted">IN</small>
<div class="fw-bold text-success" id="inTime">-</div>
</div>
</div>

<div class="col-6">
<div class="p-2">
<small class="text-muted">OUT</small>
<div class="fw-bold text-danger" id="outTime">-</div>
</div>
</div>

<div class="col-6">
<div class="p-2">
<small class="text-muted">Lunch Start</small>
<div class="fw-bold text-warning" id="lunchOut">-</div>
</div>
</div>

<div class="col-6">
<div class="p-2">
<small class="text-muted">Lunch End</small>
<div class="fw-bold text-info" id="lunchIn">-</div>
</div>
</div>

</div>

<div class="mt-3 p-2 text-center bg-light rounded">
<small>Total Working</small>
<div class="fw-bold text-success fs-5" id="workingHours">-</div>
</div>

<div id="lastStatus" class="status-text mt-3 text-center"></div>
<div id="lastScanTime" class="text-muted text-center"></div>

</div>

<!-- GUIDE -->
<button class="btn btn-outline-secondary btn-sm w-100 mb-2" onclick="toggleGuide()">
📋 How to Scan
</button>

<div id="scanGuide" class="card-ui d-none">
<h6 class="text-center mb-3">📋 How to Scan</h6>

<ul class="list-group list-group-flush">
<li class="list-group-item">Enable GPS</li>
<li class="list-group-item">Click Start Scan</li>
<li class="list-group-item">Allow Camera</li>
<li class="list-group-item">Scan QR</li>
</ul>

</div>

<div id="successBox" class="alert alert-success d-none text-center fw-bold"></div>

<!-- SCAN BUTTON -->
<div class="card-ui text-center">

<button class="btn scan-btn w-100" onclick="startScanner()">
▶ Start QR Scan
</button>

<small class="text-muted d-block mt-2">
Enable GPS & Camera
</small>

</div>

<!-- SCANNER -->
<div class="card-ui text-center">

<h6 class="text-muted mb-2">📷 Scanner</h6>
<div id="reader"></div>

</div>

<!-- HOLIDAY -->
<div class="card-ui">

<h6 class="mb-3">📅 Upcoming Holidays</h6>

<div class="table-responsive">
<table class="table align-middle mb-0">
<thead>
<tr>
<th>Date</th>
<th>Reason</th>
</tr>
</thead>
<tbody id="holidayTable"></tbody>
</table>
</div>

</div>

</div>

<!-- FLOAT BUTTON -->
<button class="floating-scan-btn" onclick="startScanner()">
📷
</button>

<script>

  const role = localStorage.getItem("role");

if(role === "admin"){
  window.location.href = "admin.html";
}

if ("serviceWorker" in navigator) {

  navigator.serviceWorker.register("/sw.js").then(reg => {

    console.log("✅ SW Registered");

    /* 🔥 UPDATE DETECT */
    reg.onupdatefound = () => {

      const newWorker = reg.installing;

      newWorker.onstatechange = () => {

        if (newWorker.state === "installed") {

          /* First install ignore */
          if (!navigator.serviceWorker.controller) return;

          /* 🔥 SHOW POPUP */
          showUpdatePopup();
        }
      };
    };

  });

}

// LOGOUT FUNCTION
function disableBtn(btn){
  btn.disabled = true;
  btn.style.opacity = "0.5";
}

function enableBtn(btn){
  btn.disabled = false;
  btn.style.opacity = "1";
}


// How to Scan FUNCTION
function toggleGuide(){
  const guide = document.getElementById("scanGuide");
  const btn = event.target;

  guide.classList.toggle("d-none");

  if(guide.classList.contains("d-none")){
    btn.innerText = "📋 How to Scan";
  } else {
    btn.innerText = "❌ Hide Guide";
  }
}

/* 🔥 POPUP UI FUNCTION */
function showUpdatePopup(){

  const popup = document.createElement("div");

  popup.innerHTML = `
    <div style="
      position:fixed;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      background:#0d6efd;
      color:white;
      padding:15px 20px;
      border-radius:10px;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
      z-index:9999;
      font-size:14px;
    ">
      🔄 New update available
      <button onclick="updateApp()" style="
        margin-left:10px;
        background:white;
        color:#0d6efd;
        border:none;
        padding:5px 10px;
        border-radius:5px;
        cursor:pointer;
      ">Update</button>
    </div>
  `;

  document.body.appendChild(popup);
}

/* 🔥 UPDATE ACTION */
function updateApp(){
  window.location.reload();
}

let userLat=null;
let userLng=null;
let scannerStarted=false;

const employeeId=localStorage.getItem("employee_id");
const employeeName=localStorage.getItem("employee_name");
const employeeDept=localStorage.getItem("employee_department");

/* ✅ LOCATION UPDATED */

const officeLat=11.0747337;
const officeLng=76.9580952;
const allowedRadius=200;

if(!employeeId){

alert("Login First");
window.location.href="login.html";

}

document.getElementById("empDetails").innerHTML=
"👤 "+employeeName+" | 🆔 "+employeeId+" | "+employeeDept;

function updateClock(){

const now=new Date();

document.getElementById("clock").innerText=
"⏰ "+now.toLocaleTimeString();

}

setInterval(updateClock,1000);
updateClock();

navigator.geolocation.watchPosition(function(pos){

userLat=pos.coords.latitude;
userLng=pos.coords.longitude;

document.getElementById("locationStatus").innerHTML=
"<span class='location-ok'>📍 Location Enabled</span>";

},
function(){

document.getElementById("locationStatus").innerHTML=
"<span class='location-off'>⚠ Location OFF — Enable GPS</span>";

},{
enableHighAccuracy:true
});

function getDistance(lat1,lon1,lat2,lon2){

const R=6371e3;

const φ1=lat1*Math.PI/180;
const φ2=lat2*Math.PI/180;

const Δφ=(lat2-lat1)*Math.PI/180;
const Δλ=(lon2-lon1)*Math.PI/180;

const a=
Math.sin(Δφ/2)*Math.sin(Δφ/2)+
Math.cos(φ1)*Math.cos(φ2)*
Math.sin(Δλ/2)*Math.sin(Δλ/2);

const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;

}

// refresh location on click
function refreshLocation(){

  if(!navigator.geolocation){
    alert("Geolocation not supported");
    return;
  }

  document.getElementById("locationStatus").innerHTML =
  "<span class='text-warning'>🔄 Refreshing location...</span>";

  navigator.geolocation.getCurrentPosition(

    function(pos){

      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;

      document.getElementById("locationStatus").innerHTML =
      "<span class='location-ok'>📍 Location Updated</span>";

    },

    function(err){

      document.getElementById("locationStatus").innerHTML =
      "<span class='location-off'>❌ Unable to fetch location</span>";

    },

    {
      enableHighAccuracy:true,
      timeout:10000
    }

  );

}

function startScanner(){

if(scannerStarted) return;

document.getElementById("reader").style.display="block";

const html5QrCode=new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices=>{

let backCamera=devices.find(d=>
d.label.toLowerCase().includes("back") ||
d.label.toLowerCase().includes("rear")
);

if(!backCamera){
backCamera=devices[0];
}

html5QrCode.start(
backCamera.id,
{fps:10,qrbox:250},

(decodedText)=>{

if(!userLat || !userLng){

alert("⚠ Enable GPS first");
return;

}

let distance=getDistance(userLat,userLng,officeLat,officeLng);

if(distance>allowedRadius){

alert("❌ Outside office location");
return;

}

document.getElementById("actionPopup").style.display="flex";

}

);

});

scannerStarted=true;

}

function updateLastStatus(msg) {
  const status = document.getElementById("lastStatus");
  const timeBox = document.getElementById("lastScanTime");

  const now = new Date().toLocaleTimeString("en-IN", {
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });

  if (msg.includes("IN")) {
    status.innerHTML = "<span class='text-success'>IN TIME</span>";
  }
  else if (msg.includes("Lunch Start")) {
    status.innerHTML = "<span class='text-warning'>LUNCH START</span>";
  }
  else if (msg.includes("Lunch End")) {
    status.innerHTML = "<span class='text-primary'>LUNCH END</span>";
  }
  else if (msg.includes("Permission")) {
    status.innerHTML = "<span class='text-secondary'>AFTERNOON PERMISSION</span>";
  }
  else if (msg.includes("OUT")) {
    status.innerHTML = "<span class='text-danger'>OUT TIME</span>";
  }
  else {
    status.innerText = msg;
  }

  timeBox.innerText = "Last Scan Time: " + now;
}

function format12hr(time){
  if(!time) return "-";

  let [h,m] = time.split(":");
  h = parseInt(h);

  let ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;

  return `${h}:${m} ${ampm}`;
}

function formatDate(){
  const now = new Date();

  return now.toLocaleDateString("en-IN", {
    day: "2-digit",
    month: "short",
    year: "numeric"
  });
}

function loadStatus() {
  fetch("/employee/status?employee_id=" + employeeId)
    .then(res => res.json())
    .then(data => {

      // 🔥 SET TODAY'S DATE
      document.getElementById("todayDate").innerText = formatDate();

      // 🔥 SET TIMES
      document.getElementById("inTime").innerText = format12hr(data.in_time);
      document.getElementById("lunchOut").innerText = format12hr(data.lunch_out);
      document.getElementById("lunchIn").innerText = format12hr(data.lunch_in);
      document.getElementById("outTime").innerText = format12hr(data.out_time);
      document.getElementById("workingHours").innerText = data.working_hours || "-";

      // 🔥 STATUS
      const lastStatus = document.getElementById("lastStatus");
      const lastScanTime = document.getElementById("lastScanTime");

      lastStatus.innerText = data.last_scan_type || data.status || "NOT MARKED";

      if (data.last_scan_time) {
        lastScanTime.innerText = "Last Scan Time: " + format12hr(data.last_scan_time);
      } else {
        lastScanTime.innerText = "Last Scan Time: -";
      }

    });
}

loadStatus();

function loadHolidays(){

fetch("/admin/upcoming-holidays")
.then(res=>res.json())
.then(data=>{

const tbody=document.getElementById("holidayTable");
tbody.innerHTML="";

data.forEach(h=>{

const tr=`
<tr>
<td>${new Date(h.holiday_date).toLocaleDateString()}</td>
<td>${h.reason}</td>
</tr>
`;

tbody.insertAdjacentHTML("beforeend",tr);

});

});

}

loadHolidays();

function logout(){

localStorage.clear();
window.location.href="login.html";

}

// Initial
window.onload = () => {
  controlOutButton();
  setInterval(controlOutButton, 60000);
};

// Disable OUT button before 7 PM
async function controlOutButton(){

  const outBtn = document.getElementById("outBtn");
  if(!outBtn) return;

  const now = new Date();

  const currentTime = new Date(
    now.toLocaleString("en-US", { timeZone: "Asia/Kolkata" })
  );

  // 🔥 GET DATA FROM API
  const res = await fetch(`/employee/status?employee_id=${employeeId}`);
  const data = await res.json();

  const inTimeText = data.in_time;
  const lunchOutText = data.lunch_out;
  const lunchInText = data.lunch_in;
  const permissionType = data.permission_type;

  if(!inTimeText){
    disableBtn(outBtn);
    return;
  }

  function parseTime(t){
    return new Date(`1970-01-01T${t}`);
  }

  const inTime = parseTime(inTimeText);

  let workedMinutes = 0;

  // before lunch
  if(lunchOutText){
    const lunchOut = parseTime(lunchOutText);
    workedMinutes += (lunchOut - inTime) / 60000;
  } else {
    workedMinutes += (currentTime - inTime) / 60000;
  }

  // after lunch
  if(lunchInText){
    const lunchIn = parseTime(lunchInText);
    workedMinutes += (currentTime - lunchIn) / 60000;
  }

  const minRequired = 7.5 * 60;

  const currentHour = currentTime.getHours();

  // CONDITIONS
  if(currentHour >= 19){
    enableBtn(outBtn);
    return;
  }

  if(permissionType === "Permission"){
    enableBtn(outBtn);
    return;
  }

  if(workedMinutes >= minRequired){
    enableBtn(outBtn);
    return;
  }

  disableBtn(outBtn);
}

// Send Attendance Data to Server
function sendAttendance(type){

document.getElementById("actionPopup").style.display="none";

fetch("/mark-attendance",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
employee_id:employeeId,
type:type,
lat:userLat,
lng:userLng
})
})
.then(res=>res.text())
.then(msg=>{

const successBox=document.getElementById("successBox");

successBox.innerText=msg;
successBox.classList.remove("d-none");

updateLastStatus(msg);

setTimeout(()=>{
location.reload();
},3000);

});

}

</script>
<!-- ACTION POPUP -->

<div id="actionPopup" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
">

<div style="
background:white;
padding:25px;
border-radius:10px;
width:300px;
text-align:center;
">

<h5 class="mb-3">Select Attendance</h5>

<button class="btn btn-success w-100 mb-2" onclick="sendAttendance('IN')">
IN TIME
</button>

<button class="btn btn-warning w-100 mb-2" onclick="sendAttendance('LUNCH_OUT')">
Lunch Start
</button>

<button class="btn btn-info w-100 mb-2" onclick="sendAttendance('LUNCH_IN')">
Lunch End
</button>

<button class="btn btn-secondary w-100 mb-2" onclick="sendAttendance('PERMISSION')">
Afternoon Permission
</button>

<button id="outBtn" class="btn btn-danger w-100" onclick="sendAttendance('OUT')">
OUT TIME
</button>

</div>
</div>
</body>
</html>
