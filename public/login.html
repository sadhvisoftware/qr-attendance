<!DOCTYPE html>
<html>
<head>
  <title>Employee Login</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">

  <div class="card shadow p-4" style="width: 350px;">

    <!-- Company Logo -->
    <div class="text-center mb-3">
      <img src="logo.png" width="80">
    </div>

    <h4 class="text-center mb-3">Employee Login</h4>

    <!-- Error Message -->
    <div id="errorBox" class="alert alert-danger d-none"></div>

    <div class="mb-3">
      <input type="email" id="email" class="form-control" placeholder="Email">
    </div>

    <div class="mb-3">
      <input type="password" id="password" class="form-control" placeholder="Password">
    </div>

    <button class="btn btn-primary w-100" onclick="login()">Login</button>

  </div>

</div>

<script>

if (localStorage.getItem("employee_id")) {
  window.location.href = "scan.html";
}

function login() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const errorBox = document.getElementById("errorBox");

  errorBox.classList.add("d-none");

  fetch("/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  })
  .then(res => res.json())
  .then(data => {

    if (data.employee_id) {

      localStorage.setItem("employee_id", data.employee_id);
      localStorage.setItem("employee_name", data.name);
      localStorage.setItem("employee_department", data.department);

      window.location.href = "scan.html";

    } else {

      errorBox.innerText = "Invalid email or password ❌";
      errorBox.classList.remove("d-none");

    }

  })
  .catch(() => {

    errorBox.innerText = "Server error. Please try again.";
    errorBox.classList.remove("d-none");

  });

}

</script>

</body>
</html>
