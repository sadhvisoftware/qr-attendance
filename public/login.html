<!DOCTYPE html>
<html>
<head>
  <title>Employee Login</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon" href="/favicon.ico" type="image/x-icon">

  <link rel="manifest" href="/manifest.json">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      background:#eef2f7;
      font-family:Segoe UI;
    }
    .card{
      border-radius:12px;
    }
  </style>

</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

  <div class="card shadow p-4" style="width: 350px;">

    <!-- Logo -->
    <div class="text-center mb-2">
      <img src="logo.png" width="80">
    </div>

    <h5 class="text-center text-muted">Sadhvi Software Solutions</h5>
    <h4 class="text-center mb-3">Employee Login</h4>

    <!-- Error Message -->
    <div id="errorBox" class="alert alert-danger d-none"></div>

    <!-- Email -->
    <div class="mb-3">
      <input type="email" id="email" class="form-control" placeholder="📧 Enter Email">
    </div>

    <!-- Password -->
    <div class="mb-2">
      <input type="password" id="password" class="form-control" placeholder="🔒 Enter Password">
    </div>

    <!-- Show Password -->
    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" onclick="togglePassword()">
      <label class="form-check-label">Show Password</label>
    </div>

    <!-- Login Button -->
    <button id="loginBtn" class="btn btn-primary w-100" onclick="login()">
      Login
    </button>

  </div>

</div>

<script>

/* Auto redirect if already logged in */
if (localStorage.getItem("employee_id")) {
  window.location.href = "scan.html";
}

/* Show/Hide Password */
function togglePassword(){
  const pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}

/* Enter key support */
document.addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    login();
  }
});

function login() {

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const errorBox = document.getElementById("errorBox");
  const btn = document.getElementById("loginBtn");

  /* Reset */
  errorBox.classList.add("d-none");

  /* Validation */
  if(!email || !password){
    errorBox.innerText = "Please enter email and password";
    errorBox.classList.remove("d-none");
    return;
  }

  /* Loading state */
  btn.innerText = "Logging in...";
  btn.disabled = true;

  fetch("/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  })
  .then(res => res.json())
  .then(data => {

    /* Reset button */
    btn.innerText = "Login";
    btn.disabled = false;

    /* Success */
    if(data.employee_id){

      localStorage.setItem("employee_id", data.employee_id);
      localStorage.setItem("employee_name", data.name);
      localStorage.setItem("employee_department", data.department);
      localStorage.setItem("role", data.role);

      if(data.role === "admin"){
        window.location.href = "admin.html";
      } else {
        window.location.href = "scan.html";
      }

    }

    /* Backend error message */
    else if(data.error){
      errorBox.innerText = data.error;
      errorBox.classList.remove("d-none");
    }

    /* Default error */
    else{
      errorBox.innerText = "Login failed";
      errorBox.classList.remove("d-none");
    }

  })
  .catch(() => {

    btn.innerText = "Login";
    btn.disabled = false;

    errorBox.innerText = "Server error. Please try again.";
    errorBox.classList.remove("d-none");

  });

}

</script>

</body>
</html>
