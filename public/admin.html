<!DOCTYPE html>
<html>
<head>

<title>Attendance Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/x-icon" href="/favicon.ico">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#eef2f7;
font-family:"Segoe UI",sans-serif;
}

.header{
font-weight:600;
}

.card{
border:none;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.stat{
text-align:center;
color:white;
padding:20px;
}

.stat h2{
font-weight:700;
}

.table{
background:white;
border-radius:10px;
}

.table tbody tr:hover{
background:#f1f5ff;
}

</style>

</head>

<body>

<div class="container-fluid p-4">

<div class="d-flex justify-content-between align-items-center mb-4">

<h3 class="header">📊 Attendance Dashboard</h3>

<button class="btn btn-danger" onclick="logout()">Logout</button>

</div>

<!-- STATS -->

<div class="row mb-4">

<div class="col-md-4">
<div class="card bg-primary stat">
<h6>Total Employees</h6>
<h2 id="totalEmployees">0</h2>
</div>
</div>

<div class="col-md-4">
<div class="card bg-success stat">
<h6>Present Today</h6>
<h2 id="presentEmployees">0</h2>
</div>
</div>

<div class="col-md-4">
<div class="card bg-danger stat">
<h6>Absent Today</h6>
<h2 id="absentEmployees">0</h2>
</div>
</div>

</div>

<!-- FILTER -->

<div class="card p-3 mb-4">

<div class="row g-3 align-items-end">

<div class="col-md-2">
<label>Date</label>
<input type="date" id="datePicker" class="form-control">
</div>

<div class="col-md-2">
<button class="btn btn-primary w-100" onclick="loadAttendance()">Load</button>
</div>

<div class="col-md-3">
<input type="text" id="searchInput" class="form-control" placeholder="🔍 Search employee...">
</div>

<div class="col-md-2">
<select id="statusFilter" class="form-control">
<option value="">All</option>
<option value="Present">Present</option>
<option value="Absent">Absent</option>
<option value="Late">Late</option>
<option value="Completed">Completed</option>
</select>
</div>

<div class="col-md-3">
<label>Report</label>
<div class="d-flex">
<input type="date" id="startDate" class="form-control">
<input type="date" id="endDate" class="form-control">
<button class="btn btn-dark ms-2" onclick="downloadReport()">⬇</button>
</div>
</div>

</div>

</div>

<!-- ADD SECTION -->

<div class="row">

<div class="col-md-6">

<button class="btn btn-primary mb-3" onclick="toggleEmployeeForm()">+ Add Employee</button>

<div class="card p-3 mb-4" id="employeeForm" style="display:none;">

<input type="text" id="empName" class="form-control mb-2" placeholder="Name">
<input type="text" id="empDepartment" class="form-control mb-2" placeholder="Department">
<input type="email" id="empEmail" class="form-control mb-2" placeholder="Email">
<input type="password" id="empPass" class="form-control mb-3" placeholder="Password">

<button class="btn btn-success w-100" onclick="addEmployee()">Add</button>

</div>

</div>

<div class="col-md-6">

<button class="btn btn-primary mb-3" onclick="toggleHolidayForm()">+ Add Holiday</button>

<div class="card p-3 mb-4" id="holidayForm" style="display:none;">

<input type="date" id="holidayDate" class="form-control mb-2">
<input type="text" id="holidayReason" class="form-control mb-3" placeholder="Reason">

<button class="btn btn-warning w-100" onclick="addHoliday()">Add</button>

</div>

</div>

</div>

<!-- TABLE -->

<div class="card p-3">

<h5>Employee Attendance</h5>

<div class="table-responsive">

<table class="table table-bordered">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>Name</th>
<th>Dept</th>
<th>Date</th>
<th>IN</th>
<th>Lunch Out</th>
<th>Lunch In</th>
<th>OUT</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="attendanceBody"></tbody>

</table>

</div>

</div>

</div>

<script>

if(localStorage.getItem("role")!=="admin"){
alert("Access denied");
window.location.href="login.html";
}

/* SEARCH */
document.getElementById("searchInput").addEventListener("keyup", function(){
const value=this.value.toLowerCase();
document.querySelectorAll("#attendanceBody tr").forEach(row=>{
row.style.display=row.innerText.toLowerCase().includes(value)?"":"none";
});
});

/* AUTO REFRESH */
setInterval(()=>{
loadAttendance();
loadStats();
},30000);

function logout(){
localStorage.clear();
window.location.href="login.html";
}

function loadStats(){
fetch("/admin/stats")
.then(res=>res.json())
.then(d=>{
totalEmployees.innerText=d.total;
presentEmployees.innerText=d.present;
absentEmployees.innerText=d.absent;
});
}

function loadAttendance(){

let date=document.getElementById("datePicker").value;
if(!date) date=new Date().toISOString().split("T")[0];

fetch("/admin/attendance?date="+date)
.then(res=>res.json())
.then(data=>{

const tbody=document.getElementById("attendanceBody");
tbody.innerHTML="";

data.forEach(row=>{

let status="Absent";
let badge="bg-danger";

/* Late */
if(row.in_time && row.in_time > "10:30:00"){
status="Late";
badge="bg-danger";
}
else if(row.out_time){
status="Completed";
badge="bg-success";
}
else if(row.in_time){
status="Working";
badge="bg-info";
}

const tr=`
<tr>
<td>${row.employee_id}</td>
<td>${row.name}</td>
<td>${row.department||"-"}</td>
<td>${row.DATE?new Date(row.DATE).toLocaleDateString():"-"}</td>
<td>${row.in_time||"-"}</td>
<td>${row.lunch_out||"-"}</td>
<td>${row.lunch_in||"-"}</td>
<td>${row.out_time||"-"}</td>
<td><span class="badge ${badge}">${status}</span></td>
<td>
<button class="btn btn-sm btn-primary" onclick="openEditEmployee(${row.employee_id},'${row.name}','${row.department}')">Edit</button>
<button class="btn btn-sm btn-danger" onclick="deleteEmployee(${row.employee_id})">Delete</button>
</td>
</tr>`;
tbody.insertAdjacentHTML("beforeend",tr);
});

});
}

function addEmployee(){

const name=empName.value;
const department=empDepartment.value;
const email=empEmail.value;
const password=empPass.value;

if(!name||!department||!email||!password){
alert("Fill all fields");
return;
}

fetch("/admin/add-employee",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,department,email,password})
})
.then(res=>res.text())
.then(msg=>{
alert(msg);
loadAttendance();
loadStats();
});

}

function deleteEmployee(id){
if(!confirm("Delete?")) return;

fetch("/admin/delete-employee",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id})
})
.then(res=>res.text())
.then(msg=>{
alert(msg);
loadAttendance();
loadStats();
});
}

/* EDIT EMPLOYEE FIX */

function openEditEmployee(id,name,department){

document.getElementById("editId").value=id;
document.getElementById("editName").value=name;
document.getElementById("editDepartment").value=department;

new bootstrap.Modal(document.getElementById("editModal")).show();
}

function updateEmployee(){

if(!confirm("Update employee?")) return;

const id=editId.value;
const name=editName.value;
const department=editDepartment.value;
const email=editEmail.value;
const password=editPassword.value;

fetch("/admin/update-employee",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id,name,department,email,password})
})
.then(res=>res.text())
.then(msg=>{
alert(msg);
location.reload();
});

}

function addHoliday(){

fetch("/admin/add-holiday",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
date:holidayDate.value,
reason:holidayReason.value
})
})
.then(res=>res.text())
.then(msg=>alert(msg));

}

function downloadReport(){
window.open(`/admin/report?start=${startDate.value}&end=${endDate.value}`);
}

datePicker.value=new Date().toISOString().split("T")[0];

loadAttendance();
loadStats();

</script>

<!-- EDIT MODAL -->

<div class="modal fade" id="editModal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5>Edit Employee</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<input type="hidden" id="editId">
<input type="text" id="editName" class="form-control mb-2">
<input type="text" id="editDepartment" class="form-control mb-2">
<input type="email" id="editEmail" class="form-control mb-2" placeholder="Email">
<input type="password" id="editPassword" class="form-control" placeholder="Password">

</div>

<div class="modal-footer">
<button class="btn btn-success" onclick="updateEmployee()">Update</button>
</div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
