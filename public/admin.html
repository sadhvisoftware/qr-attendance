<!DOCTYPE html>
<html>
<head>

<title>Attendance Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/favicon.ico" type="image/x-icon">

<link rel="manifest" href="/manifest.json">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#eef2f7;
font-family:"Segoe UI",sans-serif;
}

.header{
font-weight:600;
}

.card{
border:none;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.stat{
text-align:center;
color:white;
padding:20px;
}

.stat h2{
font-weight:700;
}

.table{
background:white;
border-radius:10px;
}

.table tbody tr:hover{
background:#f1f5ff;
}

</style>

</head>

<body>

<div class="container-fluid p-4">

<div class="d-flex justify-content-between align-items-center mb-4">

<h3 class="header">📊 SADHVI ATTENDANCE DASHBOARD </h3>

<button class="btn btn-danger" onclick="logout()">Logout</button>

</div>

<!-- STATS -->

<div class="row mb-4">

<div class="col-md-4">
<div class="card bg-primary stat">
<h6>Total Employees</h6>
<h2 id="totalEmployees">0</h2>
</div>
</div>

<div class="col-md-4">
<div class="card bg-success stat">
<h6>Present Today</h6>
<h2 id="presentEmployees">0</h2>
</div>
</div>

<div class="col-md-4">
<div class="card bg-danger stat">
<h6>Absent Today</h6>
<h2 id="absentEmployees">0</h2>
</div>
</div>

</div>

<!-- FILTER -->

<div class="card p-3 mb-4">

<div class="row g-3 align-items-end">

<div class="col-md-3">
<label>Date</label>
<input type="date" id="datePicker" class="form-control">
</div>

<div class="col-md-2">
<button class="btn btn-primary w-100" onclick="loadAttendance()">Load</button>
</div>

<div class="col-md-3">
<label>Report From</label>
<input type="date" id="startDate" class="form-control">
</div>

<div class="col-md-3">
<label>Report To</label>
<input type="date" id="endDate" class="form-control">
</div>

<div class="col-md-1">
<button class="btn btn-dark w-100" onclick="downloadReport()">⬇</button>
</div>

</div>

</div>

<!-- ADD SECTION -->

<div class="row">

<div class="col-md-6">

    <button class="btn btn-primary mb-3" onclick="toggleEmployeeForm()">
+ Add Employee
</button>
<div class="card p-3 mb-4" id="employeeForm" style="display:none;">

<h5>Add Employee</h5>

<input type="text" id="empName" class="form-control mb-2" placeholder="Name">

<input type="text" id="empDepartment" class="form-control mb-2" placeholder="Department">

<input type="email" id="empEmail" class="form-control mb-2" placeholder="Email">

<input type="password" id="empPass" class="form-control mb-3" placeholder="Password">

<button class="btn btn-success w-100" onclick="addEmployee()">Add Employee</button>

</div>

</div>

<div class="col-md-6">

 <button class="btn btn-primary mb-3" onclick="toggleHolidayForm()">
+ Add Holiday
</button>
<div class="card p-3 mb-4" id="holidayForm" style="display:none;">

<h5>Add Holiday</h5>

<input type="date" id="holidayDate" class="form-control mb-2">

<input type="text" id="holidayReason" class="form-control mb-3" placeholder="Reason">

<button class="btn btn-warning w-100" onclick="addHoliday()">Add Holiday</button>

</div>

</div>

</div>

<!-- ATTENDANCE TABLE -->

<div class="card p-3">

<h5 class="mb-3">Employee Attendance</h5>

<div class="table-responsive">

<table class="table table-bordered align-middle">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Name</th>
<th>Department</th>
<th>Date</th>
<th>IN Time</th>
<th>Lunch Start</th>
<th>Lunch End</th>
<th>OUT Time</th>
<th>Permission</th>
<th>Permission Time</th>
<th>Total Hours</th>
<th>Working Hours</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="attendanceBody"></tbody>

</table>

</div>

</div>

</div>

<script>

    

    const role = localStorage.getItem("role");

if(role !== "admin"){
alert("Access denied");
window.location.href="login.html";
}

// Register Service Worker
if ("serviceWorker" in navigator) {

  navigator.serviceWorker.register("/sw.js").then(reg => {

    console.log("✅ SW Registered");

    /* 🔥 UPDATE DETECT */
    reg.onupdatefound = () => {

      const newWorker = reg.installing;

      newWorker.onstatechange = () => {

        if (newWorker.state === "installed") {

          /* First install ignore */
          if (!navigator.serviceWorker.controller) return;

          /* 🔥 SHOW POPUP */
          showUpdatePopup();
        }
      };
    };

  });

}

/* 🔥 POPUP UI FUNCTION */
function showUpdatePopup(){

  const popup = document.createElement("div");

  popup.innerHTML = `
    <div style="
      position:fixed;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      background:#0d6efd;
      color:white;
      padding:15px 20px;
      border-radius:10px;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
      z-index:9999;
      font-size:14px;
    ">
      🔄 New update available
      <button onclick="updateApp()" style="
        margin-left:10px;
        background:white;
        color:#0d6efd;
        border:none;
        padding:5px 10px;
        border-radius:5px;
        cursor:pointer;
      ">Update</button>
    </div>
  `;

  document.body.appendChild(popup);
}

/* 🔥 UPDATE ACTION */
function updateApp(){
  window.location.reload();
}

    function toggleHolidayForm(){
        
        const form=document.getElementById("holidayForm");

        if(form.style.display==="none"){
            form.style.display="block";
        }else{
            form.style.display="none";
        }
    }


    function toggleEmployeeForm(){

const form=document.getElementById("employeeForm");

if(form.style.display==="none"){
form.style.display="block";
}else{
form.style.display="none";
}

}

function logout(){
localStorage.clear();
window.location.href="login.html";
}

function formatTime(time){

if(!time) return "-";

const [h,m]=time.split(":");

let hour=parseInt(h);

let ampm=hour>=12?"PM":"AM";

hour=hour%12;
hour=hour?hour:12;

return `${hour}:${m} ${ampm}`;

}

function loadStats(){

fetch("/admin/stats")
.then(res=>res.json())
.then(data=>{

document.getElementById("totalEmployees").innerText=data.total;
document.getElementById("presentEmployees").innerText=data.present;
document.getElementById("absentEmployees").innerText=data.absent;

});

}

function loadAttendance(){

let date=document.getElementById("datePicker").value;

if(!date){
date=new Date().toISOString().split("T")[0];
}

fetch("/admin/attendance?date="+date)

.then(res=>res.json())

.then(data=>{

const tbody=document.getElementById("attendanceBody");

tbody.innerHTML="";

data.forEach(row=>{

let status="Absent";
let badge="badge bg-danger";

/* Holiday */

if(row.holiday_reason){
status="Holiday";
badge="badge bg-warning";
}

/* WFH */

else if(row.attendance_status==="WFH"){
status="WFH";
badge="badge bg-primary";
}

/* Working */

else if(row.in_time && !row.out_time){
status="Working";
badge="badge bg-info";
}

/* Completed */

else if(row.out_time){
status="Completed";
badge="badge bg-success";
}

const tr=`

<tr>

<td>${row.employee_id}</td>

<td>${row.name}</td>

<td>${row.department || "-"}</td>

<td>${row.DATE ? new Date(row.DATE).toLocaleDateString() : "-"}</td>

<td>${formatTime(row.in_time)}</td>

<td>${formatTime(row.lunch_out)}</td>

<td>${formatTime(row.lunch_in)}</td>

<td>${formatTime(row.out_time)}</td>

<td>${row.permission_type || "-"}</td>

<td>${row.permission_time || "-"}</td>

<td>${row.total_hours || "-"}</td>

<td>${row.working_hours || "-"}</td>

<td><span class="${badge}">${status}</span></td>

<td>

<button class="btn btn-sm btn-primary"
onclick="openEditEmployee(${row.employee_id}, \`${row.name}\`, \`${row.department}\`)">
Employee
</button>

<button class="btn btn-sm btn-warning"
onclick="openEditAttendance(
  ${row.employee_id},
  '${row.DATE || document.getElementById("datePicker").value}',
  '${row.in_time || ""}',
  '${row.lunch_out || ""}',
  '${row.lunch_in || ""}',
  '${row.out_time || ""}',
  '${row.permission_type || ""}',
  '${row.permission_time || ""}'
)">
Attendance
</button>

<button class="btn btn-sm btn-danger"
onclick="deleteEmployee(${row.employee_id})">
Delete
</button>

</td>

</tr>

`;

tbody.insertAdjacentHTML("beforeend",tr);

});

});

}

function addEmployee(){

const name=document.getElementById("empName").value;
const department=document.getElementById("empDepartment").value;
const email=document.getElementById("empEmail").value;
const password=document.getElementById("empPass").value;

if(!name || !department || !email || !password){
alert("Fill all fields");
return;
}

fetch("/admin/add-employee",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name,
department,
email,
password
})
})
.then(res=>res.text())
.then(msg=>{

alert(msg);

document.getElementById("empName").value="";
document.getElementById("empDepartment").value="";
document.getElementById("empEmail").value="";
document.getElementById("empPass").value="";

loadAttendance();
loadStats();

});

}

function deleteEmployee(id){

if(!confirm("Delete this employee?")) return;

fetch("/admin/delete-employee",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id})
})
.then(res=>res.text())
.then(msg=>{

alert(msg);

loadAttendance();
loadStats();

});

}

function openEditEmployee(id,name,department){

document.getElementById("editId").value=id;
document.getElementById("editName").value=name;
document.getElementById("editDepartment").value=department;

const modal=new bootstrap.Modal(document.getElementById("editModal"));
modal.show();

}

function openEditAttendance(id,date,inTime,lunchOut,lunchIn,outTime,ptype,ptime){

document.getElementById("attEmployeeId").value=id;
document.getElementById("attDate").value =
date ? new Date(date).toISOString().split("T")[0] : "";

document.getElementById("attIn").value=inTime || "";
document.getElementById("attLunchOut").value=lunchOut || "";
document.getElementById("attLunchIn").value=lunchIn || "";
document.getElementById("attOut").value=outTime || "";

document.getElementById("attPermissionType").value=ptype || "";
document.getElementById("attPermissionTime").value=ptime || "";

const modal=new bootstrap.Modal(document.getElementById("editAttendanceModal"));
modal.show();

}

function updateEmployee(){

const id=document.getElementById("editId").value;
const name=document.getElementById("editName").value;
const department=document.getElementById("editDepartment").value;
const email=document.getElementById("empEmail").value;
const password=document.getElementById("empPass").value;

fetch("/admin/update-employee",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
id,
name,
email,
department,
password

})
})
.then(res=>res.text())
.then(msg=>{
alert(msg);
location.reload();
});

}

function updateAttendance(){

const employee_id=document.getElementById("attEmployeeId").value;
const date=document.getElementById("attDate").value;

const in_time=document.getElementById("attIn").value;
const lunch_out=document.getElementById("attLunchOut").value;
const lunch_in=document.getElementById("attLunchIn").value;
const out_time=document.getElementById("attOut").value;

const permission_type=document.getElementById("attPermissionType").value;
const permission_time=document.getElementById("attPermissionTime").value;

const attendance_status=document.getElementById("attStatus").value;

fetch("/admin/update-attendance",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
employee_id,
date,
in_time,
lunch_out,
lunch_in,
out_time,
permission_type,
permission_time,
attendance_status
})

})
.then(res=>res.text())
.then(msg=>{
alert(msg);
location.reload();
});

}

function addHoliday(){

const date=document.getElementById("holidayDate").value;
const reason=document.getElementById("holidayReason").value;

fetch("/admin/add-holiday",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({date,reason})
})
.then(res=>res.text())
.then(msg=>{
alert(msg);
});

}

function downloadReport(){

const start=document.getElementById("startDate").value;
const end=document.getElementById("endDate").value;

window.open(`/admin/report?start=${start}&end=${end}`);

}

document.getElementById("datePicker").value=
new Date().toISOString().split("T")[0];

loadAttendance();
loadStats();

</script>

<!-- EDIT EMPLOYEE -->

<div class="modal fade" id="editModal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5>Edit Employee</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<input type="hidden" id="editId">

<input type="text" id="editName" class="form-control mb-2">

<input type="text" id="editDepartment" class="form-control">

</div>

<div class="modal-footer">

<button class="btn btn-success" onclick="updateEmployee()">Update</button>

</div>

</div>
</div>
</div>

<!-- EDIT ATTENDANCE -->

<div class="modal fade" id="editAttendanceModal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5>Edit Attendance</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<input type="hidden" id="attEmployeeId">

<label>Date</label>
<input type="date" id="attDate" class="form-control mb-2">

<label>IN Time</label>
<input type="time" id="attIn" class="form-control mb-2">

<label>Lunch Start</label>
<input type="time" id="attLunchOut" class="form-control mb-2">

<label>Lunch End</label>
<input type="time" id="attLunchIn" class="form-control mb-2">

<label>OUT Time</label>
<input type="time" id="attOut" class="form-control mb-2">

<label>Permission</label>
<select id="attPermissionType" class="form-control mb-2">
<option value="">None</option>
<option value="Permission">Permission</option>
</select>

<label>Permission Time</label>
<input type="text" id="attPermissionTime" class="form-control mb-2">

<label>Status</label>
<select id="attStatus" class="form-control mb-2">
<option value="">Select</option>
<option value="Completed">Completed</option>
<option value="Half Day">Half Day</option>
<option value="WFH">WFH</option>
<option value="Leave">Leave</option>
</select>

</div>



<div class="modal-footer">

<button class="btn btn-success" onclick="updateAttendance()">Update</button>

</div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
